name: Feature request
about: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - zimavi
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this documentation report!
  - type: textarea
    id: desc
    attributes:
      label: Summary
      description: Describe the feature you'd like to see.
    validations:
      required: true
  - type: textarea
    id: motivation 
    attributes:
      label: Motivation
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your preferred implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Describe any alternative solutions you've considered.
    validations:
      required: true
  - type: textarea
    id: info
    attributes:
      label: Additional Information
      description: Anything else that might help.
